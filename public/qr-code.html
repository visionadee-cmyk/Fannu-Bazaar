<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fannu Bazaar - Download App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F0FDF4 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            object-fit: contain;
        }
        h1 {
            color: #111827;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: #6B7280;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #E5E7EB;
            margin-bottom: 20px;
            display: inline-block;
        }
        .qr-container img {
            width: 200px;
            height: 200px;
            display: block;
        }
        .download-btn {
            background: #10B981;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .download-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .app-url {
            margin-top: 20px;
            padding: 12px;
            background: #F3F4F6;
            border-radius: 8px;
            color: #374151;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo.png" alt="Fannu Bazaar" class="logo" onerror="this.style.display='none'">
        <h1>Fannu Bazaar</h1>
        <p>Scan to download our app</p>
        
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://fannu-bazaar.vercel.app" alt="QR Code">
        </div>
        
        <a href="https://fannu-bazaar.vercel.app" target="_blank" class="download-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download App
        </a>
        
        <div class="app-url">
            https://fannu-bazaar.vercel.app
        </div>
    </div>
</body>
</html>
